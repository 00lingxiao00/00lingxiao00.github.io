<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Slyness of the Sine Wave</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F2EC; 
            --text-main: #1A1A1A; 
            --text-muted: #666666;
            --accent-color: #7CA1CC;
            --border-color: rgba(0,0,0,0.08);
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 导航栏 */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2rem 5%; max-width: 1400px; margin: 0 auto;
        }
        .logo {
            font-family: var(--font-sans); font-weight: 700; font-size: 1.1rem;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-size: 0.95rem; font-weight: 500; }

        /* Hero 区域 */
        .hero { padding: 5rem 5% 2rem 5%; max-width: 1200px; margin: 0 auto; }
        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 4vw, 4rem);
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            max-width: 800px;
        }
        .hero-subtext {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            line-height: 1.7;
        }

        /* ==================== 
           全新优雅列表视图 
           ==================== */
        .list-section { padding: 4rem 5% 8rem 5%; max-width: 1200px; margin: 0 auto; }
        
        .list-container {
            border-top: 2px solid var(--text-main); /* 顶部粗线，致敬学术期刊 */
        }

        /* 表头 */
        .list-header {
            display: grid;
            grid-template-columns: 150px 200px 1fr 40px;
            padding: 1.2rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 每一行文章 */
        .list-row {
            display: grid;
            grid-template-columns: 150px 200px 1fr 40px;
            padding: 2rem 1rem;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--text-main);
            align-items: center;
            transition: background-color 0.3s ease;
        }

        /* 悬浮交互魔法：打破单调 */
        .list-row:hover { background-color: rgba(255, 255, 255, 0.4); }
        .list-row:hover .col-title { transform: translateX(10px); color: var(--accent-color); }
        .list-row:hover .col-arrow { opacity: 1; transform: translateX(0); }

        .col-date { font-family: var(--font-sans); font-size: 0.95rem; color: var(--text-muted); }
        .col-cat { font-family: var(--font-sans); font-size: 0.95rem; font-weight: 500; }
        
        .col-title { 
            font-family: var(--font-serif); 
            font-size: 1.35rem; 
            font-weight: 600; 
            line-height: 1.4;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        /* 右侧隐藏的箭头 */
        .col-arrow {
            font-size: 1.5rem;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.3s ease;
            text-align: right;
            color: var(--accent-color);
        }

        /* 响应式：手机端将表格折叠成列表 */
        @media (max-width: 768px) {
            .list-header { display: none; }
            .list-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                padding: 1.5rem 0;
            }
            .col-cat { font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.2rem; }
            .col-title { font-size: 1.2rem; }
            .col-date { font-size: 0.85rem; margin-top: 0.5rem; }
            .col-arrow { display: none; }
            .list-row:hover .col-title { transform: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">The Slyness of the Sine Wave</div>
        <div class="nav-links">
            <a href="#">Translations</a>
            <a href="#">Reading</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Latest Updates</h1>
        <p class="hero-subtext">
            社会科学、文化政治经济学与批判理论的翻译与阅读笔记。
        </p>
    </header>

    <section class="list-section">
        <div class="list-container">
            <div class="list-header">
                <div class="col-date">Date</div>
                <div class="col-cat">Category</div>
                <div class="col-title">Title</div>
                <div class="col-arrow"></div>
            </div>

            <a href="/ethnicity-inc/" class="list-row">
                <div class="col-date">Mar 08, 2026</div>
                <div class="col-cat">Anthropology</div>
                <div class="col-title">Ethnicity, Inc｜3｜Questions of Theory (译文)</div>
                <div class="col-arrow">→</div>
            </a>

            <a href="#" class="list-row" style="opacity: 0.6;">
                <div class="col-date">Upcoming</div>
                <div class="col-cat">Critical Theory</div>
                <div class="col-title">正在翻译中... (Translation in progress)</div>
                <div class="col-arrow">→</div>
            </a>
            
        </div>
    </section>
</body>
</html>
