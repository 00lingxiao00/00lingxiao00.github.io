<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00lingxiao00 | 数字花园</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        /* 定义全局变量：Anthropic 核心色板 */
        :root {
            --bg-color: #F4F2EC; 
            --text-main: #1A1A1A; 
            --text-muted: #4A4A4A;
            --card-blue: #7CA1CC;
            --card-pink: #C77D9B;
            --card-orange: #DF8B6E;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .logo {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .btn-primary {
            background-color: var(--text-main);
            color: white !important;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.8; }

        /* 顶部 Hero 区域 */
        .hero {
            display: flex;
            flex-direction: column;
            padding: 5rem 5%;
            gap: 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 992px) {
            .hero {
                flex-direction: row;
                align-items: center;
                gap: 4rem;
            }
        }

        .hero-text-content { flex: 1.2; }
        
        /* 动画容器 */
        .hero-visual {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #hero-canvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(3rem, 4.5vw, 4.5rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
        }

        .underline {
            border-bottom: 4px solid var(--text-main);
            padding-bottom: 4px;
        }

        .hero-subtext {
            font-family: var(--font-sans);
            font-size: clamp(1rem, 1.2vw, 1.1rem);
            color: var(--text-muted);
            max-width: 90%;
            line-height: 1.8;
        }

        /* 卡片区域 */
        .card-section {
            padding: 4rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 8rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background-color: transparent;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 420px; 
            background: #FAFAFA;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card-color-top {
            height: 60%;
            margin: 12px 12px 0 12px;
            border-radius: 12px;
        }

        .bg-blue { background-color: var(--card-blue); }
        .bg-pink { background-color: var(--card-pink); }
        .bg-orange { background-color: var(--card-orange); }

        .card-content {
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
        }

        .card-content h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-tag {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        /* 链接消除下划线 */
        a.card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">00LINGXIAO00</div>
        <div class="nav-links">
            <a href="#">Translations</a>
            <a href="#">Reading</a>
            <a href="#" class="btn-primary">About</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text-content">
            <h1>
                A <span class="underline">digital space</span> for <br>
                <span class="underline">translations</span>, theory, <br>
                and anthropology
            </h1>
            <p class="hero-subtext">
                欢迎来到我的数字花园。这是一个安静的角落，主要用于存放社会科学领域的翻译与阅读笔记，探索文化政治经济学与批判理论。
            </p>
        </div>
        
        <div class="hero-visual">
            <div id="hero-canvas"></div>
        </div>
    </header>

    <section class="card-section">
        <div class="card-grid">
            <a href="/ethnicity-inc/" class="card-link">
                <div class="card">
                    <div class="card-color-top bg-blue"></div>
                    <div class="card-content">
                        <h3>Ethnicity, Inc｜3｜Questions of Theory (译文)</h3>
                        <div class="card-tag"><span class="icon">📚</span> Anthropology / Translation</div>
                    </div>
                </div>
            </a>
            
            <div class="card" style="opacity: 0.7; cursor: default;">
                <div class="card-color-top bg-pink"></div>
                <div class="card-content">
                    <h3>正在翻译中...</h3>
                    <div class="card-tag"><span class="icon">⏳</span> Coming Soon</div>
                </div>
            </div>

            <div class="card" style="opacity: 0.7; cursor: default;">
                <div class="card-color-top bg-orange"></div>
                <div class="card-content">
                    <h3>正在翻译中...</h3>
                    <div class="card-tag"><span class="icon">⏳</span> Coming Soon</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        (function initDynamicSphere() {
            const container = document.getElementById('hero-canvas');
            const ns = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(ns, "svg");
            svg.setAttribute("viewBox", "-100 -100 200 200");
            svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
            svg.style.width = "100%";
            svg.style.height = "100%";
            container.appendChild(svg);

            const color = "#1A1A1A"; 
            const group = document.createElementNS(ns, "g");
            svg.appendChild(group);

            const radius = 80; 
            const latCount = 8;
            const lonCount = 12;
            let angleX = 0, angleY = 0;
            const paths = [];

            const lines = [];
            for (let i = 1; i < latCount; i++) {
                const theta = (Math.PI * i) / latCount;
                const y = Math.cos(theta) * radius;
                const r = Math.sin(theta) * radius;
                const pts = [];
                for (let j = 0; j <= 50; j++) {
                    const phi = (2 * Math.PI * j) / 50;
                    pts.push({x: r * Math.cos(phi), y: y, z: r * Math.sin(phi)});
                }
                lines.push(pts);
            }
            for (let i = 0; i < lonCount; i++) {
                const phi = (2 * Math.PI * i) / lonCount;
                const pts = [];
                for (let j = 0; j <= 50; j++) {
                    const theta = (Math.PI * j) / 50;
                    pts.push({x: radius * Math.sin(theta) * Math.cos(phi), y: radius * Math.cos(theta), z: radius * Math.sin(theta) * Math.sin(phi)});
                }
                lines.push(pts);
            }

            lines.forEach(() => {
                const p = document.createElementNS(ns, "path");
                p.setAttribute("fill", "none");
                p.setAttribute("stroke", color);
                p.setAttribute("stroke-linecap", "round");
                group.appendChild(p);
                paths.push(p);
            });

            function animate() {
                angleX += 0.0015;
                angleY += 0.0025;

                lines.forEach((pts, idx) => {
                    let d = "";
                    let totalZ = 0;
                    pts.forEach((pt, i) => {
                        let y1 = pt.y*Math.cos(angleX) - pt.z*Math.sin(angleX);
                        let z1 = pt.y*Math.sin(angleX) + pt.z*Math.cos(angleX);
                        let x2 = pt.x*Math.cos(angleY) - z1*Math.sin(angleY);
                        let z2 = pt.x*Math.sin(angleY) + z1*Math.cos(angleY);
                        
                        totalZ += z2;
                        if(i===0) d+=`M ${x2.toFixed(1)} ${y1.toFixed(1)}`;
                        else d+=` L ${x2.toFixed(1)} ${y1.toFixed(1)}`;
                    });
                    
                    const avgZ = totalZ / pts.length;
                    const normZ = (avgZ + radius)/(2*radius);
                    const op = 0.05 + 0.35 * Math.pow(normZ, 2); 
                    
                    paths[idx].setAttribute("d", d);
                    paths[idx].setAttribute("stroke-opacity", op.toFixed(2));
                    paths[idx].setAttribute("stroke-width", (0.3 + normZ * 0.6).toFixed(2));
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body>
</html>
